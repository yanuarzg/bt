<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Trends Indonesia - Live Update</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        
        .header .subtitle {
            color: #94a3b8;
            font-size: 14px;
        }
        
        .status-card {
            background: #1e293b;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .status-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }
        
        .status-dot.error {
            background: #ef4444;
        }
        
        .status-dot.loading {
            background: #f59e0b;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .status-text {
            font-weight: 600;
            font-size: 14px;
        }
        
        .update-time {
            color: #64748b;
            font-size: 13px;
        }
        
        .buttons {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-1px);
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid #334155;
            color: #e2e8f0;
        }
        
        .btn-outline:hover {
            background: #1e293b;
            border-color: #667eea;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .trend-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .trend-item {
            background: #1e293b;
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.2s;
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }
        
        .trend-item:hover {
            border-color: #334155;
            transform: translateX(4px);
            background: #1e293b;
        }
        
        .trend-item.top-1 {
            border-left: 4px solid #f59e0b;
        }
        
        .trend-item.top-2 {
            border-left: 4px solid #94a3b8;
        }
        
        .trend-item.top-3 {
            border-left: 4px solid #cd7f32;
        }
        
        .rank {
            font-size: 20px;
            font-weight: 800;
            min-width: 35px;
            color: #475569;
        }
        
        .top-1 .rank { color: #f59e0b; }
        .top-2 .rank { color: #94a3b8; }
        .top-3 .rank { color: #cd7f32; }
        
        .keyword-info {
            flex: 1;
            min-width: 0;
        }
        
        .keyword {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
            word-break: break-word;
        }
        
        .keyword a {
            color: #e2e8f0;
            text-decoration: none;
        }
        
        .keyword a:hover {
            color: #667eea;
        }
        
        .meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .meta-item {
            font-size: 12px;
            color: #64748b;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .badge-hot {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        
        .badge-new {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        
        .badge-up {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }
        
        .loading-state {
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #334155;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error-state {
            text-align: center;
            padding: 40px;
            background: #1e293b;
            border-radius: 12px;
        }
        
        .error-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .error-message {
            color: #94a3b8;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .error-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .error-link:hover {
            text-decoration: underline;
        }
        
        .method-badge {
            font-size: 10px;
            background: #334155;
            padding: 2px 8px;
            border-radius: 10px;
            color: #94a3b8;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
        
        @media (max-width: 480px) {
            .header h1 {
                font-size: 24px;
            }
            .trend-item {
                padding: 12px 16px;
                gap: 10px;
            }
            .keyword {
                font-size: 14px;
            }
            .status-card {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔥 Google Trends Indonesia</h1>
            <p class="subtitle">Trending searches • Real-time update</p>
        </div>
        
        <div class="status-card">
            <div class="status-info">
                <div class="status-dot" id="statusDot"></div>
                <div>
                    <div class="status-text" id="statusText">Connecting...</div>
                    <div class="update-time">Last update: <span id="lastUpdate">-</span></div>
                </div>
                <span class="method-badge" id="methodBadge" style="display:none;"></span>
            </div>
            <div class="buttons">
                <button class="btn btn-outline" onclick="toggleAutoRefresh()" id="autoRefreshBtn">
                    ⏱ Auto: ON
                </button>
                <button class="btn btn-primary" onclick="fetchTrends()" id="refreshBtn">
                    🔄 Refresh
                </button>
            </div>
        </div>
        
        <div class="trend-list" id="trendList">
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Mengambil data trending...</p>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // KONFIGURASI
        // ============================================
        const AUTO_REFRESH_INTERVAL = 5 * 60 * 1000; // 5 menit
        const COUNTRY_CODE = 'ID';
        const MAX_TRENDS = 25;
        let autoRefreshEnabled = true;
        let autoRefreshTimer = null;
        let currentMethod = '';

        // ============================================
        // MULTI PROXY LIST (dicoba satu per satu)
        // ============================================
        const PROXY_URLS = [
            'https://api.allorigins.win/raw?url=',
            'https://corsproxy.io/?',
            'https://api.codetabs.com/v1/proxy?quest=',
        ];

        // ============================================
        // FUNGSI UTAMA: FETCH TRENDS
        // ============================================
        async function fetchTrends() {
            const trendList = document.getElementById('trendList');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const refreshBtn = document.getElementById('refreshBtn');
            const methodBadge = document.getElementById('methodBadge');

            // Set loading state
            statusDot.className = 'status-dot loading';
            statusText.textContent = 'Fetching data...';
            refreshBtn.disabled = true;
            refreshBtn.textContent = '⏳ Loading...';
            methodBadge.style.display = 'none';
            trendList.innerHTML = '<div class="loading-state"><div class="spinner"></div><p>Mencoba mengambil data trending terbaru...</p></div>';

            let trends = null;

            // ============================================
            // METHOD 1: RSS Feed via multiple proxies
            // ============================================
            trends = await tryRSSMethod();
            
            // ============================================
            // METHOD 2: Direct Daily Trends API
            // ============================================
            if (!trends) {
                trends = await tryDailyTrendsMethod();
            }

            // ============================================
            // METHOD 3: Explore page scraping
            // ============================================
            if (!trends) {
                trends = await tryExploreMethod();
            }

            // ============================================
            // RENDER RESULTS
            // ============================================
            if (trends && trends.length > 0) {
                renderTrends(trends);
                statusDot.className = 'status-dot';
                statusText.textContent = `Live • ${trends.length} trending topics`;
                methodBadge.style.display = 'inline-block';
                methodBadge.textContent = `Method: ${currentMethod}`;
                updateTimestamp();
            } else {
                showErrorState();
                statusDot.className = 'status-dot error';
                statusText.textContent = 'Failed to fetch';
                methodBadge.style.display = 'none';
            }

            // Reset button
            refreshBtn.disabled = false;
            refreshBtn.textContent = '🔄 Refresh';
        }

        // ============================================
        // METHOD 1: RSS Feed
        // ============================================
        async function tryRSSMethod() {
            for (const proxy of PROXY_URLS) {
                try {
                    const rssUrl = 'https://trends.google.com/trending/rss?geo=' + COUNTRY_CODE;
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 10000);
                    
                    const response = await fetch(proxy + encodeURIComponent(rssUrl), {
                        signal: controller.signal
                    });
                    
                    clearTimeout(timeoutId);
                    
                    if (!response.ok) continue;
                    
                    const text = await response.text();
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(text, 'text/xml');
                    const items = xmlDoc.querySelectorAll('item');
                    
                    if (items.length === 0) continue;
                    
                    currentMethod = 'RSS Feed';
                    const trends = [];
                    
                    items.forEach((item, index) => {
                        if (index >= MAX_TRENDS) return;
                        
                        const title = item.querySelector('title')?.textContent || '';
                        const description = item.querySelector('description')?.textContent || '';
                        const traffic = item.querySelector('ht\\:approx_traffic')?.textContent || 
                                        item.querySelector('approx_traffic')?.textContent || '';
                        
                        const newsItems = item.querySelectorAll('ht\\:news_item, news_item');
                        let newsTitle = '';
                        if (newsItems.length > 0) {
                            const newsTitleEl = newsItems[0].querySelector('ht\\:news_item_title, news_item_title');
                            newsTitle = newsTitleEl?.textContent || '';
                        }
                        
                        trends.push({
                            title,
                            traffic: traffic.replace(/\+/g, ''),
                            newsTitle,
                            url: `https://www.google.com/search?q=${encodeURIComponent(title)}`
                        });
                    });
                    
                    return trends;
                    
                } catch (e) {
                    console.warn('Proxy failed:', proxy, e.message);
                    continue;
                }
            }
            return null;
        }

        // ============================================
        // METHOD 2: Daily Trends API
        // ============================================
        async function tryDailyTrendsMethod() {
            for (const proxy of PROXY_URLS) {
                try {
                    const url = 'https://trends.google.com/trends/api/dailytrends?hl=en-US&tz=-480&geo=' + COUNTRY_CODE + '&ns=15';
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 10000);
                    
                    const response = await fetch(proxy + encodeURIComponent(url), {
                        signal: controller.signal
                    });
                    
                    clearTimeout(timeoutId);
                    
                    if (!response.ok) continue;
                    
                    const text = await response.text();
                    // Remove Google's anti-XSS prefix
                    const jsonStr = text.replace(/^\)\]\}\',\n?/, '');
                    const data = JSON.parse(jsonStr);
                    
                    if (!data.default?.trendingSearchesDays?.[0]?.trendingSearches) continue;
                    
                    currentMethod = 'Daily API';
                    const searches = data.default.trendingSearchesDays[0].trendingSearches;
                    const trends = [];
                    
                    searches.forEach((item, index) => {
                        if (index >= MAX_TRENDS) return;
                        
                        let newsTitle = '';
                        if (item.articles && item.articles.length > 0) {
                            newsTitle = item.articles[0].title;
                        }
                        
                        trends.push({
                            title: item.title.query,
                            traffic: item.formattedTraffic || '',
                            newsTitle,
                            url: `https://www.google.com/search?q=${encodeURIComponent(item.title.query)}`
                        });
                    });
                    
                    return trends;
                    
                } catch (e) {
                    console.warn('Daily API failed:', proxy, e.message);
                    continue;
                }
            }
            return null;
        }

        // ============================================
        // METHOD 3: Explore page data
        // ============================================
        async function tryExploreMethod() {
            for (const proxy of PROXY_URLS) {
                try {
                    const url = 'https://trends.google.com/trends/trendingsearches/daily?geo=' + COUNTRY_CODE;
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 10000);
                    
                    const response = await fetch(proxy + encodeURIComponent(url), {
                        signal: controller.signal
                    });
                    
                    clearTimeout(timeoutId);
                    
                    if (!response.ok) continue;
                    
                    const html = await response.text();
                    
                    // Cari embedded JSON data
                    const match = html.match(/trendingSearchesDaily\["ID"\]\s*=\s*(\[[\s\S]*?\]);/);
                    if (!match) continue;
                    
                    const data = JSON.parse(match[1]);
                    if (!data[0]?.trendingSearches) continue;
                    
                    currentMethod = 'Explore Page';
                    const searches = data[0].trendingSearches;
                    const trends = [];
                    
                    searches.forEach((item, index) => {
                        if (index >= MAX_TRENDS) return;
                        
                        let newsTitle = '';
                        if (item.articles && item.articles.length > 0) {
                            newsTitle = item.articles[0].title;
                        }
                        
                        trends.push({
                            title: item.title.query,
                            traffic: item.formattedTraffic || '',
                            newsTitle,
                            url: `https://www.google.com/search?q=${encodeURIComponent(item.title.query)}`
                        });
                    });
                    
                    return trends;
                    
                } catch (e) {
                    console.warn('Explore method failed:', proxy, e.message);
                    continue;
                }
            }
            return null;
        }

        // ============================================
        // RENDER TRENDS KE HTML
        // ============================================
        function renderTrends(trends) {
            const trendList = document.getElementById('trendList');
            
            let html = '';
            trends.forEach((trend, index) => {
                const rank = index + 1;
                let topClass = '';
                if (rank === 1) topClass = 'top-1';
                else if (rank === 2) topClass = 'top-2';
                else if (rank === 3) topClass = 'top-3';
                
                // Badge untuk 5 teratas
                let badge = '';
                if (rank <= 3) badge = '<span class="badge badge-hot">HOT</span>';
                else if (trend.traffic && trend.traffic.includes('K')) badge = '<span class="badge badge-up">TREND</span>';
                
                const trafficDisplay = trend.traffic ? 
                    `<span class="meta-item">📊 ${trend.traffic}</span>` : '';
                
                const newsDisplay = trend.newsTitle ? 
                    `<span class="meta-item" title="${trend.newsTitle}">📰 ${trend.newsTitle.substring(0, 60)}${trend.newsTitle.length > 60 ? '...' : ''}</span>` : '';
                
                html += `
                    <div class="trend-item ${topClass}">
                        <div class="rank">#${rank}</div>
                        <div class="keyword-info">
                            <div class="keyword">
                                <a href="${trend.url}" target="_blank" rel="noopener">
                                    ${trend.title}
                                </a>
                                ${badge}
                            </div>
                            <div class="meta">
                                ${trafficDisplay}
                                ${newsDisplay}
                            </div>
                        </div>
                    </div>
                `;
            });
            
            trendList.innerHTML = html;
        }

        // ============================================
        // ERROR STATE
        // ============================================
        function showErrorState() {
            const trendList = document.getElementById('trendList');
            trendList.innerHTML = `
                <div class="error-state">
                    <div class="error-icon">⚠️</div>
                    <h3>Tidak dapat mengambil data</h3>
                    <p class="error-message">
                        Semua metode pengambilan data gagal.<br>
                        Kemungkinan karena pembatasan jaringan atau rate limiting.
                    </p>
                    <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
                        <a href="https://trends.google.com/trends/trendingsearches/daily?geo=ID" 
                           target="_blank" class="btn btn-primary" style="text-decoration: none;">
                            🔗 Buka Google Trends
                        </a>
                        <button class="btn btn-outline" onclick="fetchTrends()">
                            🔄 Coba Lagi
                        </button>
                    </div>
                </div>
            `;
        }

        // ============================================
        // HELPERS
        // ============================================
        function updateTimestamp() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('id-ID', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('lastUpdate').textContent = timeStr;
        }

        function toggleAutoRefresh() {
            autoRefreshEnabled = !autoRefreshEnabled;
            const btn = document.getElementById('autoRefreshBtn');
            
            if (autoRefreshEnabled) {
                btn.textContent = '⏱ Auto: ON';
                btn.classList.add('btn-outline');
                btn.classList.remove('btn-primary');
                startAutoRefresh();
            } else {
                btn.textContent = '⏱ Auto: OFF';
                btn.classList.remove('btn-outline');
                btn.classList.add('btn-primary');
                stopAutoRefresh();
            }
        }

        function startAutoRefresh() {
            stopAutoRefresh();
            autoRefreshTimer = setInterval(fetchTrends, AUTO_REFRESH_INTERVAL);
        }

        function stopAutoRefresh() {
            if (autoRefreshTimer) {
                clearInterval(autoRefreshTimer);
                autoRefreshTimer = null;
            }
        }

        // ============================================
        // INIT
        // ============================================
        fetchTrends();
        startAutoRefresh();

        // Handle visibility change - pause when tab not visible
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                stopAutoRefresh();
            } else if (autoRefreshEnabled) {
                fetchTrends(); // Refresh immediately when tab becomes visible
                startAutoRefresh();
            }
        });
    </script>
</body>
</html>
