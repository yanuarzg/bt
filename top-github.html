<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Repo Explorer — Top Stars</title>
<style>
  :root{
    --bg:#0b0e14;
    --bg-soft:#11141c;
    --panel:rgba(255,255,255,0.04);
    --panel-border:rgba(255,255,255,0.08);
    --text:#e6e8ee;
    --text-dim:#8b92a5;
    --accent:#6ee7ff;
    --accent-2:#a78bfa;
    --star:#ffd76e;
    --danger:#ff6e6e;
    --radius:16px;
    --shadow:0 8px 30px rgba(0,0,0,0.35);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(110,231,255,0.08), transparent 60%),
      radial-gradient(1000px 500px at 100% 0%, rgba(167,139,250,0.10), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh;
    padding:20px 16px 60px;
  }
  .wrap{max-width:1100px;margin:0 auto;}
  header{
    display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;
  }
  header .logo{
    width:40px;height:40px;flex:none;
  }
  header h1{
    font-size:1.35rem;margin:0;font-weight:700;letter-spacing:.2px;
  }
  header p{margin:2px 0 0;color:var(--text-dim);font-size:.85rem;}

  .panel{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:var(--radius);
    padding:16px;
    -webkit-backdrop-filter:blur(14px);
    backdrop-filter:blur(14px);
    box-shadow:var(--shadow);
  }

  .controls{
    display:grid;
    grid-template-columns:1.4fr 1fr 1fr 1fr auto;
    gap:10px;
    margin-bottom:18px;
  }
  @media (max-width:800px){
    .controls{grid-template-columns:1fr 1fr;}
    .controls .search-field{grid-column:1 / -1;}
    .controls .go-btn{grid-column:1 / -1;}
  }

  label{
    display:block;font-size:.72rem;color:var(--text-dim);margin-bottom:5px;
    text-transform:uppercase;letter-spacing:.06em;
  }
  .field{display:flex;flex-direction:column;}
  input[type=text],select{
    background:var(--bg-soft);
    border:1px solid var(--panel-border);
    color:var(--text);
    padding:10px 12px;
    border-radius:10px;
    font-size:.92rem;
    outline:none;
    transition:border-color .15s;
    width:100%;
  }
  input[type=text]:focus,select:focus{border-color:var(--accent);}
  select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%238b92a5' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>");
    background-repeat:no-repeat;background-position:right 10px center;padding-right:32px;}

  .go-btn{
    display:flex;align-items:flex-end;
  }
  button.primary{
    width:100%;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    color:#0b0e14;
    border:none;
    font-weight:700;
    padding:11px 16px;
    border-radius:10px;
    cursor:pointer;
    font-size:.92rem;
    display:flex;align-items:center;justify-content:center;gap:8px;
    transition:transform .12s, filter .12s;
  }
  button.primary:hover{filter:brightness(1.08);}
  button.primary:active{transform:scale(0.98);}
  button.primary:disabled{opacity:.6;cursor:default;}

  .order-toggle{
    display:flex;align-items:center;gap:8px;margin:-6px 0 18px;color:var(--text-dim);font-size:.82rem;
  }
  .order-toggle button{
    background:var(--bg-soft);
    border:1px solid var(--panel-border);
    color:var(--text);
    padding:6px 12px;
    border-radius:999px;
    cursor:pointer;
    font-size:.78rem;
    display:flex;align-items:center;gap:6px;
  }
  .order-toggle button.active{
    border-color:var(--accent);
    color:var(--accent);
  }

  .status{
    color:var(--text-dim);font-size:.85rem;margin:6px 2px 14px;min-height:18px;
    display:flex;align-items:center;gap:8px;
  }
  .status.error{color:var(--danger);}

  .repo-list{display:flex;flex-direction:column;gap:10px;}
  .repo-card{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:14px;
    padding:14px 16px;
    display:grid;
    grid-template-columns:auto 1fr auto;
    gap:14px;
    align-items:center;
    transition:border-color .15s, transform .15s;
  }
  .repo-card:hover{border-color:rgba(110,231,255,0.35);transform:translateY(-1px);}
  .rank{
    font-weight:800;
    font-size:1.1rem;
    color:var(--text-dim);
    width:34px;text-align:center;
  }
  .repo-main{min-width:0;}
  .repo-main a{
    color:var(--text);
    font-weight:700;
    font-size:1rem;
    text-decoration:none;
  }
  .repo-main a:hover{color:var(--accent);}
  .repo-desc{
    color:var(--text-dim);
    font-size:.85rem;
    margin:4px 0 8px;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .repo-meta{
    display:flex;flex-wrap:wrap;gap:14px;font-size:.8rem;color:var(--text-dim);
  }
  .repo-meta span{display:flex;align-items:center;gap:5px;}
  .repo-meta svg{width:14px;height:14px;flex:none;}
  .lang-badge{
    display:inline-flex;align-items:center;gap:6px;
    background:rgba(255,255,255,0.05);
    border:1px solid var(--panel-border);
    padding:3px 9px;border-radius:999px;
    font-size:.75rem;color:var(--text-dim);
  }
  .lang-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex:none;}
  .repo-stars{
    text-align:right;
    display:flex;flex-direction:column;align-items:flex-end;gap:2px;
  }
  .repo-stars .num{
    font-weight:800;font-size:1.05rem;color:var(--star);
    display:flex;align-items:center;gap:5px;
  }
  .repo-stars .num svg{width:16px;height:16px;}

  .pagination{
    display:flex;justify-content:center;align-items:center;gap:12px;margin-top:22px;
  }
  .pagination button{
    background:var(--panel);
    border:1px solid var(--panel-border);
    color:var(--text);
    padding:8px 16px;border-radius:10px;cursor:pointer;font-size:.85rem;
    display:flex;align-items:center;gap:6px;
  }
  .pagination button:disabled{opacity:.4;cursor:default;}
  .pagination span{color:var(--text-dim);font-size:.85rem;}

  .empty, .loading{
    text-align:center;padding:40px 16px;color:var(--text-dim);
  }
  .skeleton{
    background:linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.07) 37%, rgba(255,255,255,0.03) 63%);
    background-size:400% 100%;
    animation:shimmer 1.4s ease infinite;
    border-radius:14px;height:78px;margin-bottom:10px;
  }
  @keyframes shimmer{0%{background-position:100% 0;}100%{background-position:0 0;}}

  footer{
    text-align:center;color:var(--text-dim);font-size:.75rem;margin-top:30px;
  }
  footer a{color:var(--accent-2);}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <svg class="logo" viewBox="0 0 24 24" fill="none">
      <path d="M12 2C6.48 2 2 6.58 2 12.17c0 4.49 2.87 8.3 6.84 9.65.5.1.68-.22.68-.49 0-.24-.01-1.04-.01-1.89-2.78.61-3.37-1.19-3.37-1.19-.46-1.18-1.11-1.5-1.11-1.5-.91-.63.07-.62.07-.62 1 .07 1.53 1.04 1.53 1.04.89 1.55 2.34 1.1 2.91.84.09-.66.35-1.1.63-1.36-2.22-.26-4.56-1.13-4.56-5.03 0-1.11.39-2.02 1.03-2.73-.1-.26-.45-1.31.1-2.72 0 0 .84-.27 2.75 1.04a9.4 9.4 0 0 1 5 0c1.91-1.31 2.75-1.04 2.75-1.04.55 1.41.2 2.46.1 2.72.64.71 1.03 1.62 1.03 2.73 0 3.91-2.34 4.77-4.57 5.02.36.32.68.94.68 1.9 0 1.37-.01 2.47-.01 2.81 0 .27.18.6.69.49A10.02 10.02 0 0 0 22 12.17C22 6.58 17.52 2 12 2z" fill="#e6e8ee"/>
    </svg>
    <div>
      <h1>GitHub Repo Explorer</h1>
      <p>Cari & sort repository berdasarkan stars, forks, update, bahasa, dan topik</p>
    </div>
  </header>

  <div class="panel">
    <div class="controls">
      <div class="field search-field">
        <label for="q">Kata Kunci</label>
        <input type="text" id="q" placeholder="cth: wordpress plugin, cms, seo tool...">
      </div>
      <div class="field">
        <label for="category">Kategori / Topik</label>
        <select id="category">
          <option value="">Semua Kategori</option>
          <option value="wordpress">WordPress</option>
          <option value="wordpress-plugin">WordPress Plugin</option>
          <option value="wordpress-theme">WordPress Theme</option>
          <option value="blogger">Blogger</option>
          <option value="cms">CMS</option>
          <option value="seo">SEO</option>
          <option value="static-site-generator">Static Site Generator</option>
          <option value="google-apps-script">Google Apps Script</option>
          <option value="pos">Point of Sale (POS)</option>
          <option value="chatbot">Chatbot / AI</option>
          <option value="automation">Automation</option>
          <option value="framework">Framework</option>
        </select>
      </div>
      <div class="field">
        <label for="language">Bahasa</label>
        <select id="language">
          <option value="">Semua Bahasa</option>
          <option value="JavaScript">JavaScript</option>
          <option value="TypeScript">TypeScript</option>
          <option value="PHP">PHP</option>
          <option value="Python">Python</option>
          <option value="HTML">HTML</option>
          <option value="CSS">CSS</option>
          <option value="Java">Java</option>
          <option value="Go">Go</option>
          <option value="Rust">Rust</option>
          <option value="C++">C++</option>
          <option value="Shell">Shell</option>
        </select>
      </div>
      <div class="field">
        <label for="sort">Urutkan</label>
        <select id="sort">
          <option value="stars">Stars</option>
          <option value="forks">Forks</option>
          <option value="updated">Terakhir Update</option>
          <option value="help-wanted-issues">Help Wanted Issues</option>
        </select>
      </div>
      <div class="go-btn">
        <button class="primary" id="searchBtn">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          Cari
        </button>
      </div>
    </div>

    <div class="order-toggle">
      Urutan:
      <button id="orderDesc" class="active">
        <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 19V5M5 12l7 7 7-7"/></svg>
        Tertinggi
      </button>
      <button id="orderAsc">
        <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12l7-7 7 7"/></svg>
        Terendah
      </button>
    </div>

    <div class="status" id="status"></div>
    <div class="repo-list" id="repoList"></div>

    <div class="pagination" id="pagination" style="display:none;">
      <button id="prevBtn">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M15 18l-6-6 6-6"/></svg>
        Sebelumnya
      </button>
      <span id="pageInfo">Halaman 1</span>
      <button id="nextBtn">
        Berikutnya
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>
  </div>

  <footer>
    Data via <a href="https://docs.github.com/en/rest/search" target="_blank" rel="noopener">GitHub Search API</a> (unauthenticated, limit 10 req/menit).
  </footer>
</div>

<script>
(function(){
  const qEl = document.getElementById('q');
  const categoryEl = document.getElementById('category');
  const languageEl = document.getElementById('language');
  const sortEl = document.getElementById('sort');
  const searchBtn = document.getElementById('searchBtn');
  const orderDescBtn = document.getElementById('orderDesc');
  const orderAscBtn = document.getElementById('orderAsc');
  const statusEl = document.getElementById('status');
  const repoListEl = document.getElementById('repoList');
  const paginationEl = document.getElementById('pagination');
  const pageInfoEl = document.getElementById('pageInfo');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  const PER_PAGE = 20;
  let state = { page: 1, order: 'desc', totalCount: 0 };

  const starIcon = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.26L21.6 9l-4.8 4.4L18 21l-6-3.6L6 21l1.2-7.6L2.4 9l6.7-.74z"/></svg>`;
  const forkIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="2.2"/><circle cx="18" cy="6" r="2.2"/><circle cx="12" cy="18" r="2.2"/><path d="M6 8.2V11a3 3 0 0 0 3 3h2M18 8.2V11a3 3 0 0 1-3 3h-2M12 14v2.2"/></svg>`;
  const issueIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>`;
  const clockIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>`;
  const spinIcon = `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="9" opacity="0.25"/><path d="M21 12a9 9 0 0 0-9-9"/></svg>`;

  function buildQuery(){
    const parts = [];
    const kw = qEl.value.trim();
    if (kw) parts.push(kw);
    const cat = categoryEl.value;
    if (cat) parts.push(`topic:${cat}`);
    const lang = languageEl.value;
    if (lang) parts.push(`language:${lang}`);
    if (parts.length === 0) parts.push('stars:>1000');
    return parts.join(' ');
  }

  function timeAgo(dateStr){
    const diff = Date.now() - new Date(dateStr).getTime();
    const days = Math.floor(diff / 86400000);
    if (days < 1) return 'hari ini';
    if (days < 30) return days + ' hari lalu';
    const months = Math.floor(days / 30);
    if (months < 12) return months + ' bulan lalu';
    return Math.floor(months / 12) + ' tahun lalu';
  }

  function fmt(n){
    if (n >= 1000000) return (n/1000000).toFixed(1) + 'jt';
    if (n >= 1000) return (n/1000).toFixed(1) + 'rb';
    return String(n);
  }

  function renderSkeleton(){
    repoListEl.innerHTML = '';
    for (let i=0;i<6;i++){
      const d = document.createElement('div');
      d.className = 'skeleton';
      repoListEl.appendChild(d);
    }
  }

  function renderRepos(items, startRank){
    repoListEl.innerHTML = '';
    if (!items.length){
      repoListEl.innerHTML = `<div class="empty">Tidak ada repository ditemukan. Coba ubah kata kunci atau kategori.</div>`;
      return;
    }
    items.forEach((repo, i) => {
      const card = document.createElement('div');
      card.className = 'repo-card';
      card.innerHTML = `
        <div class="rank">#${startRank + i}</div>
        <div class="repo-main">
          <a href="${repo.html_url}" target="_blank" rel="noopener">${escapeHtml(repo.full_name)}</a>
          <div class="repo-desc">${escapeHtml(repo.description || 'Tidak ada deskripsi.')}</div>
          <div class="repo-meta">
            ${repo.language ? `<span class="lang-badge"><span class="lang-dot"></span>${escapeHtml(repo.language)}</span>` : ''}
            <span>${forkIcon} ${fmt(repo.forks_count)} forks</span>
            <span>${issueIcon} ${fmt(repo.open_issues_count)} issues</span>
            <span>${clockIcon} update ${timeAgo(repo.updated_at)}</span>
          </div>
        </div>
        <div class="repo-stars">
          <div class="num">${starIcon} ${fmt(repo.stargazers_count)}</div>
        </div>
      `;
      repoListEl.appendChild(card);
    });
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  async function search(){
    const query = buildQuery();
    const sort = sortEl.value;
    const order = state.order;
    const page = state.page;

    statusEl.className = 'status';
    statusEl.innerHTML = `${spinIcon} Memuat data...`;
    searchBtn.disabled = true;
    renderSkeleton();
    paginationEl.style.display = 'none';

    const url = `https://api.github.com/search/repositories?q=${encodeURIComponent(query)}&sort=${sort}&order=${order}&per_page=${PER_PAGE}&page=${page}`;

    try {
      const res = await fetch(url, { headers: { 'Accept': 'application/vnd.github+json' } });
      if (!res.ok){
        if (res.status === 403){
          throw new Error('Rate limit GitHub API tercapai (unauthenticated: 10 req/menit). Tunggu sebentar lalu coba lagi.');
        }
        throw new Error(`GitHub API error: ${res.status}`);
      }
      const data = await res.json();
      state.totalCount = Math.min(data.total_count, 1000); // GitHub Search API cap 1000 hasil

      renderRepos(data.items, (page - 1) * PER_PAGE + 1);

      statusEl.className = 'status';
      statusEl.textContent = `Ditemukan ${fmt(data.total_count)} repo (menampilkan hingga 1000 teratas) — query: "${query}"`;

      const totalPages = Math.max(1, Math.ceil(state.totalCount / PER_PAGE));
      pageInfoEl.textContent = `Halaman ${page} dari ${totalPages}`;
      prevBtn.disabled = page <= 1;
      nextBtn.disabled = page >= totalPages;
      paginationEl.style.display = 'flex';

    } catch(err){
      statusEl.className = 'status error';
      statusEl.textContent = err.message;
      repoListEl.innerHTML = `<div class="empty">Gagal memuat data. ${escapeHtml(err.message)}</div>`;
    } finally {
      searchBtn.disabled = false;
    }
  }

  searchBtn.addEventListener('click', () => { state.page = 1; search(); });
  qEl.addEventListener('keydown', (e) => { if (e.key === 'Enter'){ state.page = 1; search(); } });
  categoryEl.addEventListener('change', () => { state.page = 1; search(); });
  languageEl.addEventListener('change', () => { state.page = 1; search(); });
  sortEl.addEventListener('change', () => { state.page = 1; search(); });

  orderDescBtn.addEventListener('click', () => {
    state.order = 'desc'; state.page = 1;
    orderDescBtn.classList.add('active'); orderAscBtn.classList.remove('active');
    search();
  });
  orderAscBtn.addEventListener('click', () => {
    state.order = 'asc'; state.page = 1;
    orderAscBtn.classList.add('active'); orderDescBtn.classList.remove('active');
    search();
  });

  prevBtn.addEventListener('click', () => { if (state.page > 1){ state.page--; search(); } });
  nextBtn.addEventListener('click', () => { state.page++; search(); });

  // initial load
  search();
})();
</script>
</body>
</html>
