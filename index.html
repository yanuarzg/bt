<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Saya | Powered by Google Sheets</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600">SheetBlog.</h1>
            <nav class="space-x-6 text-gray-600 font-medium">
                <a href="#" class="hover:text-blue-600">Beranda</a>
                <a href="#posts" class="hover:text-blue-600">Artikel</a>
            </nav>
        </div>
    </header>

    <section class="py-16 bg-gradient-to-br from-blue-500 to-indigo-700 text-white text-center px-6">
        <h2 class="text-4xl md:text-5xl font-extrabold mb-4">Blog Dinamis dari Google Sheets</h2>
        <p class="text-lg opacity-90">Mengelola konten semudah mengisi tabel spreadsheet.</p>
    </section>

    <main id="posts" class="max-w-5xl mx-auto px-6 py-12">
        <div id="loading" class="text-center py-10 text-gray-500">Memuat artikel...</div>
        <div id="blog-container" class="grid md:grid-cols-2 gap-8">
            </div>
    </main>

    <footer class="py-10 text-center border-t border-gray-200 text-gray-500">
        <p>&copy; 2026 - Dibuat dengan Google Sheets API & Tailwind CSS</p>
    </footer>

    <script>
        // KONFIGURASI: Ganti dengan ID Sheet Anda
        const SHEET_ID = '1WPjL-4BZqfziNmwyf9mEKUisbaJ1D1Bsq-67UD5838s'; 
        const SHEET_NAME = 'Sheet1'; // Nama tab di spreadsheet Anda
        
        // Menggunakan URL Gviz untuk mengambil data dalam format JSON
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;

        async function fetchBlogPosts() {
            try {
                const response = await fetch(url);
                const text = await response.text();
                
                // Membersihkan respon JSON dari Google (karena ada teks tambahan di awal)
                const jsonData = JSON.parse(text.substring(47).slice(0, -2));
                const rows = jsonData.table.rows;
                const container = document.getElementById('blog-container');
                const loading = document.getElementById('loading');

                loading.classList.add('hidden');

                rows.forEach(row => {
                    const judul = row.c[0] ? row.c[0].v : 'Tanpa Judul';
                    const kategori = row.c[1] ? row.c[1].v : 'Umum';
                    const ringkasan = row.c[2] ? row.c[2].v : '';
                    const tanggal = row.c[3] ? row.c[3].v : '';

                    const card = `
                        <article class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition">
                            <span class="text-xs font-bold uppercase tracking-wider text-blue-600 bg-blue-50 px-3 py-1 rounded-full">${kategori}</span>
                            <h3 class="text-2xl font-bold mt-4 mb-2 text-gray-800">${judul}</h3>
                            <p class="text-gray-600 mb-4">${ringkasan}</p>
                            <div class="flex justify-between items-center mt-6 border-t pt-4 text-sm text-gray-400 font-medium">
                                <span>${tanggal}</span>
                                <a href="#" class="text-blue-600 hover:underline">Baca Selengkapnya &rarr;</a>
                            </div>
                        </article>
                    `;
                    container.innerHTML += card;
                });
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('loading').innerText = 'Gagal memuat artikel. Pastikan Spreadsheet sudah di-publish ke web.';
            }
        }

        fetchBlogPosts();
    </script>
</body>
</html>
